  <style>
/* =========================================================
   SNEL11 — Design System tokens
   Source: Brand Book SNEL11 + moodboard
   Fonts: brand-supplied variable TTFs in /fonts/
   ========================================================= */

@font-face {
  font-family: "Inter";
  src: url("LP_SNEL_5_Emissao/fonts/Inter-VariableFont_opsz_wght.ttf") format("truetype-variations");
  font-weight: 100 900;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: "Inter";
  src: url("LP_SNEL_5_Emissao/fonts/Inter-Italic-VariableFont_opsz_wght.ttf") format("truetype-variations");
  font-weight: 100 900;
  font-style: italic;
  font-display: swap;
}

@font-face {
  font-family: "Roboto Flex";
  src: url("LP_SNEL_5_Emissao/fonts/RobotoFlex-VariableFont_GRAD_XOPQ_XTRA_YOPQ_YTAS_YTDE_YTFI_YTLC_YTUC_opsz_slnt_wdth_wght.ttf") format("truetype-variations");
  font-weight: 100 1000;
  font-stretch: 25% 151%;
  font-style: oblique -10deg 0deg;
  font-display: swap;
}

:root {
  /* -------------------------------------------------------
     Brand palette — straight from the brand book
     ------------------------------------------------------- */
  --snel-blue-50:   #F5F7FC;   /* near-white background */
  --snel-blue-100:  #E1E8F3;   /* light gray-blue */
  --snel-blue-200:  #CFE3FD;   /* very light blue */
  --snel-blue-400:  #609CFC;   /* signature mid-blue */
  --snel-blue-900:  #0D184D;   /* deep institutional navy */

  --snel-sun-500:   #FABE1E;   /* solar yellow */
  --snel-sun-600:   #FE8E23;   /* solar orange */

  --snel-neutral-300: #A0ABB9; /* secondary text on light */
  --snel-neutral-100: #E1E8F3; /* divider on light */

  /* -------------------------------------------------------
     Semantic tokens — light surface
     ------------------------------------------------------- */
  --bg-page:        var(--snel-blue-50);
  --bg-surface:     #FFFFFF;
  --bg-raised:      #FFFFFF;
  --bg-tint:        var(--snel-blue-200);
  --bg-inverse:     var(--snel-blue-900);

  --fg-1:           var(--snel-blue-900);    /* primary text */
  --fg-2:           #3A4566;                  /* secondary text */
  --fg-3:           var(--snel-neutral-300);  /* tertiary / captions */
  --fg-on-inverse:  #FFFFFF;
  --fg-on-accent:   #FFFFFF;

  --border-1:       var(--snel-blue-100);
  --border-2:       #D5DEEC;
  --border-strong:  var(--snel-blue-900);

  --accent:         var(--snel-blue-400);
  --accent-strong:  var(--snel-blue-900);
  --accent-on-dark: var(--snel-sun-500);    /* yellow pops on navy */
  --warning:        var(--snel-sun-600);
  --success:        #1FA971;                 /* derived — used in dashboards */
  --danger:         #E0413E;                 /* derived — alerts */

  /* -------------------------------------------------------
     Typography — Roboto Flex for titles, Inter for body
     ------------------------------------------------------- */
  --font-display: "Roboto Flex", "Roboto", system-ui, -apple-system, sans-serif;
  --font-body:    "Inter", system-ui, -apple-system, sans-serif;
  --font-mono:    ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* type scale — major-third-ish, optimized for institutional */
  --fs-display: 64px;
  --fs-h1:      48px;
  --fs-h2:      36px;
  --fs-h3:      28px;
  --fs-h4:      22px;
  --fs-lg:      18px;
  --fs-body:    16px;
  --fs-sm:      14px;
  --fs-xs:      12px;

  --lh-tight:   1.05;
  --lh-snug:    1.20;
  --lh-normal:  1.45;
  --lh-loose:   1.65;

  /* tracking — for institutional tight headlines */
  --tracking-tight:  -0.02em;
  --tracking-snug:   -0.01em;
  --tracking-normal:  0em;
  --tracking-wide:    0.04em;   /* eyebrow / KEYWORD labels */
  --tracking-wider:   0.08em;

  /* -------------------------------------------------------
     Spacing — 4px base
     ------------------------------------------------------- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;

  /* -------------------------------------------------------
     Radii — generous, capsule-friendly
     ------------------------------------------------------- */
  --r-xs:   4px;
  --r-sm:   8px;
  --r-md:   12px;
  --r-lg:   16px;
  --r-xl:   24px;
  --r-2xl:  32px;
  --r-pill: 999px;

  /* -------------------------------------------------------
     Shadows — soft, institutional, never punchy
     ------------------------------------------------------- */
  --shadow-1: 0 1px 2px rgba(13, 24, 77, 0.04), 0 1px 1px rgba(13, 24, 77, 0.03);
  --shadow-2: 0 4px 12px rgba(13, 24, 77, 0.06), 0 2px 4px rgba(13, 24, 77, 0.04);
  --shadow-3: 0 12px 32px rgba(13, 24, 77, 0.10), 0 4px 8px rgba(13, 24, 77, 0.05);
  --shadow-glow-blue: 0 0 0 4px rgba(96, 156, 252, 0.18);
  --shadow-glow-yellow: 0 0 0 4px rgba(250, 190, 30, 0.25);

  /* -------------------------------------------------------
     Motion
     ------------------------------------------------------- */
  --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --dur-fast: 120ms;
  --dur-med:  220ms;
  --dur-slow: 420ms;
}

/* =========================================================
   Semantic element styles
   Use these classes (or apply rules to your h1/h2/p directly)
   ========================================================= */

html, body {
  background: var(--bg-page);
  color: var(--fg-1);
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  -webkit-font-smoothing: antialiased;
}

.display, h1.display {
  font-family: var(--font-display);
  font-size: var(--fs-display);
  font-weight: 800;
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--fg-1);
}

h1, .h1 {
  font-family: var(--font-display);
  font-size: var(--fs-h1);
  font-weight: 700;
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  color: var(--fg-1);
}

h2, .h2 {
  font-family: var(--font-display);
  font-size: var(--fs-h2);
  font-weight: 700;
  line-height: var(--lh-snug);
  letter-spacing: var(--tracking-snug);
  color: var(--fg-1);
}

h3, .h3 {
  font-family: var(--font-display);
  font-size: var(--fs-h3);
  font-weight: 600;
  line-height: var(--lh-snug);
  color: var(--fg-1);
}

h4, .h4 {
  font-family: var(--font-display);
  font-size: var(--fs-h4);
  font-weight: 600;
  line-height: var(--lh-snug);
  color: var(--fg-1);
}

p, .body {
  font-family: var(--font-body);
  font-size: var(--fs-body);
  line-height: var(--lh-normal);
  color: var(--fg-2);
}

.lede {
  font-family: var(--font-body);
  font-size: var(--fs-lg);
  line-height: var(--lh-normal);
  color: var(--fg-2);
}

.caption, small {
  font-family: var(--font-body);
  font-size: var(--fs-sm);
  color: var(--fg-3);
}

.eyebrow {
  font-family: var(--font-body);
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: var(--tracking-wide);
  text-transform: uppercase;
  color: var(--fg-3);
}

.kpi {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 56px;
  line-height: 1;
  letter-spacing: var(--tracking-tight);
  color: var(--fg-1);
  font-variant-numeric: tabular-nums;
}

code, .mono {
  font-family: var(--font-mono);
  font-size: 0.92em;
}

/* ===========================================================
   SNEL11 — 5ª Emissão landing page
   Built on /colors_and_type.css design tokens
   =========================================================== */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg-page);
  color: var(--fg-1);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; }

/* shared layout helpers */
.container {
  width: 100%;
  max-width: 1240px;
  margin: 0 auto;
  padding-inline: var(--space-6);
}
.container--wide {
  max-width: 1360px;
}
.section {
  padding-block: clamp(var(--space-16), 9vw, var(--space-24));
  position: relative;
}
.section--tight {
  padding-block: clamp(var(--space-12), 6vw, var(--space-16));
}
.section--ink {
  background: var(--snel-blue-900);
  color: var(--fg-on-inverse);
}
.section--ink h2, .section--ink h3, .section--ink h4, .section--ink .display { color: #fff; }
.section--ink p { color: rgba(255,255,255,0.72); }
.section--soft {
  background: var(--snel-blue-50);
}

/* eyebrow chip (sentence section label) */
.eyebrow-chip {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--snel-blue-900);
  padding: 7px 14px 7px 10px;
  border: 1.5px solid var(--snel-blue-400);
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.7);
}
.eyebrow-chip .dot {
  width: 18px; height: 18px;
  border-radius: 999px;
  background: var(--snel-sun-500);
  display: grid; place-items: center;
  color: var(--snel-blue-900);
  font-weight: 800;
  font-size: 10px;
}
.section--ink .eyebrow-chip {
  color: #fff;
  border-color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.06);
}

/* simpler eyebrow tag */
.eyebrow-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-3);
  padding: 4px 0;
}
.eyebrow-tag--accent { color: var(--snel-blue-400); }

/* display headlines */
.h-display {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(40px, 5.4vw, 76px);
  line-height: 0.98;
  letter-spacing: -0.025em;
  color: var(--snel-blue-900);
  margin: 0;
  text-wrap: balance;
}
.section--ink .h-display { color: #fff; }
.h-section {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(32px, 3.4vw, 52px);
  line-height: 1.02;
  letter-spacing: -0.022em;
  color: var(--snel-blue-900);
  margin: 0;
  text-wrap: balance;
}
.h-section .accent { color: var(--snel-sun-500); }
.h-section .ink { color: var(--snel-blue-900); }
.h-card {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(22px, 1.8vw, 28px);
  line-height: 1.12;
  letter-spacing: -0.015em;
  color: var(--snel-blue-900);
  margin: 0;
}
.lede {
  font-family: var(--font-body);
  font-size: clamp(16px, 1.2vw, 19px);
  line-height: 1.55;
  color: var(--fg-2);
  max-width: 62ch;
}
.section--ink .lede { color: rgba(255,255,255,0.72); }
.subtle {
  font-size: 13px;
  color: var(--fg-3);
  line-height: 1.5;
}

/* buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: var(--font-body);
  font-size: 15px;
  font-weight: 600;
  padding: 14px 26px;
  border-radius: var(--r-pill);
  border: 1.5px solid transparent;
  cursor: pointer;
  transition: transform var(--dur-fast) var(--ease-out),
              background var(--dur-med) var(--ease-out),
              box-shadow var(--dur-med) var(--ease-out),
              color var(--dur-med) var(--ease-out);
  line-height: 1;
  white-space: nowrap;
  text-decoration: none;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }

.btn--primary {
  background: #2ABD74;
  color: #fff;
  box-shadow: 0 6px 16px rgba(42,189,116,0.28);
}
.btn--primary:hover { background: #229E61; box-shadow: 0 10px 28px rgba(42,189,116,0.36); }

.btn--sun {
  background: #2ABD74;
  color: #fff;
  box-shadow: 0 6px 16px rgba(42,189,116,0.28);
}
.btn--sun:hover { background: #229E61; box-shadow: 0 10px 28px rgba(42,189,116,0.36); }

.btn--ghost {
  background: transparent;
  color: var(--snel-blue-900);
  border-color: var(--snel-blue-900);
}
.btn--ghost:hover { background: var(--snel-blue-900); color: #fff; }
.section--ink .btn--ghost {
  color: #fff;
  border-color: rgba(255,255,255,0.6);
}
.section--ink .btn--ghost:hover { background: #fff; color: var(--snel-blue-900); }

.btn--lg { padding: 17px 32px; font-size: 16px; }
.btn--xl { padding: 20px 36px; font-size: 17px; }

.btn-arrow {
  display: inline-grid; place-items: center;
  width: 22px; height: 22px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  margin-left: 2px;
}
.btn--sun .btn-arrow { background: rgba(255,255,255,0.2); }

/* =============== ALERT BAR (Dobra 1) =============== */
.alert-bar {
  background: var(--snel-sun-500);
  color: var(--snel-blue-900);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.01em;
}
.alert-bar__inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 11px 24px;
  text-align: center;
}
.alert-bar__pulse {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 700;
}
.alert-bar__sep {
  opacity: 0.45;
}
.alert-bar a {
  text-decoration: underline;
  text-underline-offset: 3px;
}
.alert-bar__cta {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px 5px 14px;
  background: var(--snel-blue-900);
  color: #fff;
  border-radius: 999px;
  font-weight: 600;
  letter-spacing: 0.01em;
  text-decoration: none !important;
  transition: background 160ms ease, transform 160ms ease;
}
.alert-bar__cta:hover {
  background: #000;
  transform: translateY(-1px);
}
@keyframes pulseDot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.4; }
}
.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 999px;
  background: var(--snel-blue-900);
  animation: pulseDot 1.6s ease-in-out infinite;
}

/* =============== HEADER =============== */
.site-header {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(12px);
  background: rgba(245, 247, 252, 0.85);
  border-bottom: 1px solid var(--border-1);
}
.site-header__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 0;
  gap: var(--space-8);
}
.site-header__brand {
  display: flex; align-items: center; gap: 14px;
}
.site-header__brand img { height: 28px; }
.site-header__brand .ticker {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 16px;
  color: var(--snel-blue-900);
  letter-spacing: -0.01em;
  border-left: 1px solid var(--border-2);
  padding-left: 14px;
}
.site-header__nav {
  display: flex;
  align-items: center;
  gap: 28px;
}
.site-header__nav a {
  font-size: 14px;
  font-weight: 500;
  color: var(--fg-2);
  transition: color var(--dur-fast);
}
.site-header__nav a:hover { color: var(--snel-blue-900); }
.site-header__cta {
  display: flex; gap: 10px; align-items: center;
}
@media (max-width: 880px) {
  .site-header__nav { display: none; }
}

/* =============== HERO (Dobra 2) =============== */
.hero {
  position: relative;
  padding-block: clamp(48px, 8vw, 96px) clamp(56px, 7vw, 104px);
  overflow: hidden;
}
.hero__bg {
  position: absolute; inset: 0;
  z-index: -1;
  background:
    radial-gradient(60% 60% at 80% 20%, rgba(96,156,252,0.22), transparent 70%),
    radial-gradient(50% 50% at 15% 80%, rgba(250,190,30,0.10), transparent 70%);
}
.hero__grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1.05fr);
  gap: clamp(32px, 5vw, 80px);
  align-items: center;
}
@media (max-width: 980px) {
  .hero__grid { grid-template-columns: 1fr; }
}

.hero__lockup {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 6px 18px 6px 6px;
  border: 1.5px solid var(--snel-blue-400);
  border-radius: var(--r-pill);
  background: rgba(255,255,255,0.7);
  margin-bottom: 22px;
  backdrop-filter: blur(8px);
}
.hero__lockup-img {
  display: block;
  height: 56px;
  width: auto;
  margin-bottom: 22px;
}
.hero__lockup .num {
  width: 30px; height: 30px;
  border-radius: 999px;
  background: var(--snel-sun-500);
  display: grid; place-items: center;
  color: var(--snel-blue-900);
  font-family: var(--font-display);
  font-weight: 900;
  font-size: 16px;
  line-height: 1;
}
.hero__lockup .text {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--snel-blue-900);
  font-size: 14px;
  letter-spacing: 0.04em;
}

.hero h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(44px, 6.2vw, 88px);
  line-height: 0.96;
  letter-spacing: -0.03em;
  color: var(--snel-blue-900);
  margin: 0 0 18px;
  text-wrap: balance;
}
.hero h1 .sun {
  color: var(--snel-sun-500);
  font-style: italic;
  font-weight: 800;
}
.hero h1 .accent {
  color: var(--snel-blue-400);
}
.hero__sub {
  font-size: clamp(16px, 1.25vw, 19px);
  line-height: 1.55;
  color: var(--fg-2);
  max-width: 52ch;
  margin: 0 0 14px;
}
.hero__sub .strong { color: var(--snel-blue-900); font-weight: 600; }
.hero__ctas {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-top: 28px;
}
.hero__meta {
  margin-top: 36px;
  display: flex;
  gap: 28px;
  flex-wrap: wrap;
  align-items: center;
  border-top: 1px solid var(--border-1);
  padding-top: 22px;
}
.hero__meta-item {
  display: flex; flex-direction: column;
  gap: 2px;
}
.hero__meta-item .v {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 24px;
  color: var(--snel-blue-900);
  letter-spacing: -0.01em;
  line-height: 1;
}
.hero__meta-item .l {
  font-size: 11px;
  color: var(--fg-3);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Hero photo collage — 3-row, 3-col masonry */
.hero__collage {
  display: grid;
  grid-template-columns: 1fr 1.15fr 1fr;
  grid-template-rows: 200px 160px 200px;
  gap: 14px;
  position: relative;
}
@media (max-width: 980px) {
  .hero__collage { grid-template-rows: 180px 140px 180px; }
}
@media (max-width: 580px) {
  .hero__collage {
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 160px 160px 160px;
  }
}
.tile {
  border-radius: var(--r-xl);
  overflow: hidden;
  position: relative;
  background: var(--snel-blue-200);
  box-shadow: var(--shadow-2);
}
.tile img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform 600ms var(--ease-out);
}
.tile:hover img { transform: scale(1.05); }

.tile--a { grid-column: 1; grid-row: 1 / span 2; }
.tile--b { grid-column: 2; grid-row: 1; }
.tile--c { grid-column: 3; grid-row: 1 / span 2; }
.tile--d { grid-column: 2; grid-row: 2 / span 2; }
.tile--e { grid-column: 1; grid-row: 3; }
.tile--f { grid-column: 3; grid-row: 3; }

@media (max-width: 580px) {
  .tile--a { grid-column: 1; grid-row: 1; }
  .tile--b { grid-column: 2; grid-row: 1; }
  .tile--c { grid-column: 1; grid-row: 2; }
  .tile--d { grid-column: 2; grid-row: 2; }
  .tile--e { grid-column: 1; grid-row: 3; }
  .tile--f { grid-column: 2; grid-row: 3; }
}

/* Floating community card on collage */
.hero__badge {
  position: absolute;
  z-index: 3;
  background: #fff;
  border-radius: var(--r-lg);
  padding: 14px 16px;
  box-shadow: var(--shadow-3);
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 180px;
}
.hero__badge--counts { top: 12px; right: 12px; }
.hero__badge .big {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 28px;
  color: var(--snel-blue-400);
  letter-spacing: -0.02em;
  line-height: 1;
}
.hero__badge .label {
  font-size: 11px;
  color: var(--fg-3);
  line-height: 1.35;
  max-width: 140px;
}
.hero__badge .avatars {
  display: flex; margin-top: 4px;
}
.hero__badge .avatar {
  width: 26px; height: 26px;
  border-radius: 999px;
  border: 2px solid #fff;
  background-size: cover; background-position: center;
  margin-left: -8px;
}
.hero__badge .avatar:first-child { margin-left: 0; }

/* tiny floating yield card */
.hero__badge--yield { bottom: -18px; left: -18px; }
.hero__badge--yield .big { color: var(--snel-sun-600); font-size: 22px; }
.hero__badge--yield .label { font-size: 11px; }

.hero__disclaimer {
  margin-top: 56px;
  text-align: center;
  font-size: 11px;
  color: var(--fg-3);
  letter-spacing: 0.01em;
  max-width: 820px;
  margin-inline: auto;
  line-height: 1.6;
}

/* =============== VIDEO HERO (Dobra 3) =============== */
.video-hero {
  position: relative;
}
.video-frame {
  position: relative;
  aspect-ratio: 16 / 9;
  border-radius: var(--r-2xl);
  overflow: hidden;
  background: var(--snel-blue-900);
  box-shadow: var(--shadow-3);
  cursor: pointer;
}
.video-frame img {
  width: 100%; height: 100%; object-fit: cover;
  filter: saturate(1.05) brightness(0.7);
  transition: transform 800ms var(--ease-out), filter 400ms;
}
.video-frame:hover img { transform: scale(1.04); filter: saturate(1.1) brightness(0.78); }
.video-frame__gradient {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(13,24,77,0.45) 0%, rgba(13,24,77,0.05) 50%, rgba(254,142,35,0.18) 100%);
  pointer-events: none;
}
.video-frame__play {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 92px; height: 92px;
  border-radius: 999px;
  background: var(--snel-sun-500);
  display: grid; place-items: center;
  color: var(--snel-blue-900);
  box-shadow: 0 12px 40px rgba(250,190,30,0.45);
  transition: transform var(--dur-med) var(--ease-out);
}
.video-frame:hover .video-frame__play { transform: translate(-50%, -50%) scale(1.08); }
.video-frame__play svg {
  margin-left: 4px;
}
.video-frame__chip {
  position: absolute;
  top: 22px; left: 22px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(13,24,77,0.55);
  backdrop-filter: blur(12px);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 8px 14px;
  border-radius: var(--r-pill);
  border: 1px solid rgba(255,255,255,0.2);
}
.video-frame__title {
  position: absolute;
  left: 28px; bottom: 28px;
  right: 28px;
  color: #fff;
}
.video-frame__title h3 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: clamp(22px, 2vw, 32px);
  line-height: 1.1;
  margin: 0;
  letter-spacing: -0.01em;
  max-width: 24ch;
}
.video-frame__title p {
  margin: 8px 0 0;
  color: rgba(255,255,255,0.78);
  font-size: 14px;
}

/* =============== EMOTIONAL (Dobra 4) =============== */
.emotional__intro {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: clamp(40px, 5vw, 80px);
  align-items: end;
  margin-bottom: var(--space-12);
}
@media (max-width: 920px) {
  .emotional__intro { grid-template-columns: 1fr; align-items: start; }
}
.emotional__intro .copy p { margin-block: 14px 0; }
.emotional__cta { display: flex; gap: 12px; margin-top: 24px; flex-wrap: wrap; }

.pillars {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 52px;
}
@media (max-width: 980px) {
  .pillars { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 540px) {
  .pillars { grid-template-columns: 1fr; }
}
.pillar {
  background: #fff;
  border: 1px solid var(--border-2);
  border-radius: var(--r-xl);
  padding: 26px 22px 24px;
  position: relative;
  transition: transform var(--dur-med) var(--ease-out), box-shadow var(--dur-med);
  display: flex; flex-direction: column; gap: 12px;
  min-height: 210px;
  box-shadow: 0 2px 10px rgba(13, 24, 77, 0.07);
}
.pillar:hover { transform: translateY(-3px); box-shadow: var(--shadow-3); }
.pillar__icon {
  position: absolute;
  top: 20px; right: 20px;
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--snel-sun-500);
  display: grid; place-items: center;
  color: var(--snel-blue-900);
}
.pillar h4 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  line-height: 1.18;
  letter-spacing: -0.01em;
  color: var(--snel-blue-900);
  margin: 0;
  padding-right: 52px;
}
.pillar p {
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--fg-2);
  margin: 0;
}

/* =============== BIG NUMBERS (Dobra 5) =============== */
.bignums {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
@media (max-width: 760px) {
  .bignums { grid-template-columns: 1fr; }
  .bignum { padding: 28px 28px 26px; }
  .bignum__label { font-size: 13px; }
  .bignum__value { font-size: 80px; margin-top: 24px; }
  .bignum__value .unit { font-size: 0.45em; }
  .bignum__value .prefix { font-size: 0.45em; }
  .bignum__sub { font-size: 16px; }
  .bignum__num-area { padding-bottom: 18px; margin-bottom: 10px; }
}
.bignum {
  background: #fff;
  border-radius: var(--r-xl);
  padding: 32px 28px 28px;
  position: relative;
  border: 1px solid var(--border-2);
  border-top: 4px solid var(--snel-blue-400);
  min-height: 200px;
  display: flex; flex-direction: column; justify-content: space-between;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(13, 24, 77, 0.09);
  transition: transform var(--dur-med) var(--ease-out), box-shadow var(--dur-med);
}
.bignum:hover { transform: translateY(-3px); box-shadow: 0 10px 36px rgba(13, 24, 77, 0.14); }
.bignum--accent { border-top-color: var(--snel-sun-500); }
.bignum__label {
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
  font-weight: 600;
}
.bignum__value {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(42px, 4.8vw, 68px);
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--snel-blue-900);
  font-variant-numeric: tabular-nums;
  margin-top: 28px;
}
.bignum--accent .bignum__value { color: var(--snel-sun-500); }
.bignum__value .unit {
  font-size: 0.52em;
  font-weight: 700;
  margin-left: 2px;
  opacity: 0.7;
}
.bignum__value .prefix {
  font-size: 0.52em;
  font-weight: 700;
  margin-right: 4px;
  opacity: 0.6;
}
.bignum__sub {
  font-size: 13px;
  color: var(--fg-3);
  margin-top: 10px;
  line-height: 1.4;
}
.bignum__spark {
  position: absolute;
  right: 22px; bottom: 22px;
  opacity: 0.5;
}
.bignum__num-area {
  position: relative;
  padding-bottom: 16px;
  margin-bottom: 8px;
}
.bignum__num-area::after {
  content: '';
  position: absolute;
  left: 0; bottom: 0;
  width: 28px; height: 3px;
  background: var(--snel-blue-400);
  border-radius: 2px;
}
.bignum--accent .bignum__num-area::after { background: var(--snel-sun-500); }
.bignum__note--bold {
  font-size: 12px;
  font-weight: 600;
  color: var(--fg-2);
  line-height: 1.6;
}

/* =============== RESULT CARDS (Dobra 6) =============== */
.result-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.result-card {
  background: #fff;
  border: 1px solid var(--border-2);
  border-top: 4px solid var(--snel-blue-400);
  border-radius: var(--r-xl);
  padding: 28px;
  display: flex; flex-direction: column;
  gap: 16px;
  transition: box-shadow var(--dur-med) var(--ease-out), transform var(--dur-med);
  min-height: 420px;
  box-shadow: 0 4px 24px rgba(13, 24, 77, 0.07);
}
.result-card:hover { box-shadow: 0 10px 36px rgba(13, 24, 77, 0.13); transform: translateY(-2px); }
.result-card__head {
  display: flex; align-items: center; justify-content: space-between;
}
.result-card__num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--snel-blue-400);
}
.result-card__chart {
  background: var(--snel-blue-50);
  border-radius: var(--r-lg);
  padding: 18px;
  min-height: 180px;
  position: relative;
  overflow: hidden;
  flex: 1;
}
.result-card h4 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--snel-blue-900);
  line-height: 1.22;
}
.result-card p {
  font-size: 13px;
  color: var(--fg-2);
  line-height: 1.5;
  margin: 0;
}
.result-cta {
  margin-top: 40px;
  text-align: center;
}
@media (max-width: 860px) {
  .result-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 560px) {
  .result-grid { grid-template-columns: 1fr; }
}

/* =============== WHY NOW (Dobra 7) =============== */
.why-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 28px;
}
.reasons {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.reason {
  background: #fff;
  border-radius: var(--r-xl);
  padding: 20px 22px 18px;
  border: 1px solid var(--border-1);
  display: flex; flex-direction: column; gap: 8px;
  position: relative;
  overflow: hidden;
}
.reason::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--snel-blue-400);
  transition: width var(--dur-med) var(--ease-out);
}
.reason:hover::before { width: 6px; }
.reason--accent::before { background: var(--snel-sun-500); }
.reason__num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 12px;
  color: var(--snel-blue-400);
  letter-spacing: 0.06em;
}
.reason--accent .reason__num { color: var(--snel-sun-600); }
.reason h4 {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.01em;
  line-height: 1.22;
  margin: 0;
  color: var(--snel-blue-900);
}
.reason p {
  font-size: 13px;
  line-height: 1.55;
  color: var(--fg-2);
  margin: 0;
}
.price-card {
  position: sticky;
  top: 80px;
  height: 100%;
  background: #fff;
  border-radius: var(--r-xl);
  overflow: hidden;
  border: 1px solid var(--border-2);
  box-shadow: 0 12px 48px rgba(13,24,77,0.18);
  display: flex;
  flex-direction: column;
}
.price-card__header {
  background: linear-gradient(135deg, var(--snel-blue-900) 0%, #162666 100%);
  padding: 22px 24px 20px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}
.price-card__header-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.price-card__header-title {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
}
.price-card__body {
  padding: 22px 24px 20px;
  display: flex;
  flex-direction: column;
  flex: 1;
}
.price-card__inner {
  border-radius: var(--r-lg);
  overflow: hidden;
  border: 1px solid var(--border-2);
  margin-bottom: 18px;
  box-shadow: 0 4px 20px rgba(13,24,77,0.08);
}
.price-card__img {
  height: 100px;
  background: center/cover no-repeat;
  position: relative;
}
.price-card__img-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(240,244,255,1) 0%, rgba(240,244,255,0.3) 55%, transparent 100%);
}
.price-card__inner-content {
  background: linear-gradient(160deg, var(--snel-blue-50) 0%, #eef3ff 100%);
  border-top: 4px solid var(--snel-sun-500);
  padding: 14px 20px 20px;
  text-align: center;
}
.price-card__badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(13,24,77,0.07);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--snel-blue-900);
  text-transform: uppercase;
  margin-bottom: 10px;
}
.price-card__value {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(64px, 7vw, 88px);
  color: var(--snel-sun-500);
  letter-spacing: -0.03em;
  line-height: 1;
}
.price-card__value .prefix {
  font-size: 0.36em;
  font-weight: 700;
  color: var(--fg-2);
  margin-right: 3px;
  vertical-align: middle;
}
.price-card__label {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  color: var(--snel-blue-900);
  margin-top: 6px;
}
.price-card__divider {
  width: 36px;
  height: 3px;
  background: var(--snel-sun-500);
  border-radius: 2px;
  margin: 10px auto 12px;
}
.price-card__discount {
  font-size: 13px;
  font-weight: 700;
  color: var(--snel-blue-900);
  margin-bottom: 3px;
}
.price-card__discount-note {
  font-size: 10.5px;
  color: var(--fg-3);
  line-height: 1.4;
}
.price-card__note {
  font-size: 11px;
  color: var(--fg-3);
  line-height: 1.55;
  padding-top: 14px;
  border-top: 1px solid var(--border-1);
  margin-top: auto;
}
.why-cta {
  text-align: center;
  margin-top: 52px;
}

/* =============== BEFORE / AFTER (Dobra 8) =============== */
.compare {
  background: #fff;
  border-radius: var(--r-2xl);
  padding: clamp(28px, 4vw, 56px);
  box-shadow: var(--shadow-1);
  border: 1px solid var(--border-1);
}
.compare__head {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 24px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--border-1);
}
.compare__head-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
  align-self: end;
}
.compare__head-now {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--snel-blue-900);
  font-size: 20px;
}
.compare__head-after {
  font-family: var(--font-display);
  font-weight: 800;
  color: var(--snel-blue-400);
  font-size: 20px;
}
.compare__row {
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr;
  gap: 24px;
  padding: 24px 0;
  border-bottom: 1px solid var(--border-1);
  align-items: center;
}
.compare__row:last-child { border-bottom: none; }
.compare__metric {
  display: flex; flex-direction: column; gap: 4px;
}
.compare__metric-label {
  font-family: var(--font-display);
  font-weight: 700;
  color: var(--snel-blue-900);
  font-size: 17px;
}
.compare__metric-help {
  font-size: 13px; color: var(--fg-3); line-height: 1.4;
}
.compare__now, .compare__after {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(28px, 2.6vw, 36px);
  letter-spacing: -0.02em;
  line-height: 1;
}
.compare__now {
  color: var(--fg-3);
}
.compare__after {
  color: var(--snel-blue-900);
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.compare__after .arrow {
  color: var(--snel-sun-500);
  font-size: 0.6em;
}
.compare__after .delta {
  font-size: 12px;
  color: var(--snel-sun-600);
  font-weight: 600;
  margin-left: 4px;
}
@media (max-width: 720px) {
  .compare__head, .compare__row {
    grid-template-columns: 1fr 1fr;
  }
  .compare__head-label, .compare__metric { grid-column: 1 / -1; }
}

/* =============== CRONOGRAMA (Dobra 9) =============== */
.cronograma {
  position: relative;
  padding-left: 40px;
}
.cronograma::before {
  content: '';
  position: absolute;
  left: 30px; top: 12px; bottom: 12px;
  width: 2px;
  background: var(--snel-blue-100);
}
.crono-step {
  position: relative;
  padding: 20px 0 20px 32px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 32px;
  align-items: start;
}
.crono-step::before {
  content: '';
  position: absolute;
  left: -17px; top: 26px;
  width: 14px; height: 14px;
  border-radius: 999px;
  background: #fff;
  border: 3px solid var(--snel-blue-400);
  z-index: 1;
}
.crono-step--current::before {
  background: var(--snel-sun-500);
  border-color: var(--snel-sun-600);
  box-shadow: 0 0 0 6px rgba(250,190,30,0.18);
}
.crono-step__date {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  color: var(--snel-blue-900);
  display: flex; align-items: center; gap: 10px;
  flex-wrap: wrap;
}
.crono-step__tag {
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  background: var(--snel-blue-50);
  color: var(--snel-blue-400);
}
.crono-step--current .crono-step__tag {
  background: var(--snel-sun-500);
  color: var(--snel-blue-900);
}
.crono-step__body {
  display: flex; flex-direction: column; gap: 6px;
}
.crono-step__title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 19px;
  color: var(--snel-blue-900);
  letter-spacing: -0.01em;
}
.crono-step__desc {
  font-size: 14px;
  color: var(--fg-2);
  line-height: 1.55;
}
@media (max-width: 760px) {
  .crono-step { grid-template-columns: 1fr; gap: 8px; }
}

/* =============== TUTORIAL (Dobra 10) =============== */
.tutorial {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 900px) { .tutorial { grid-template-columns: 1fr; } }
.path {
  background: #fff;
  border-radius: var(--r-2xl);
  padding: 36px;
  border: 1px solid var(--border-1);
}
.path--cotista { background: var(--snel-blue-900); color: #fff; border-color: transparent; }
.path__tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px;
  border-radius: var(--r-pill);
  background: var(--snel-blue-50);
  color: var(--snel-blue-400);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-bottom: 16px;
}
.path--cotista .path__tag { background: rgba(250,190,30,0.15); color: var(--snel-sun-500); }
.path__title {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: clamp(22px, 2vw, 28px);
  letter-spacing: -0.015em;
  line-height: 1.18;
  color: var(--snel-blue-900);
  margin: 0 0 28px;
}
.path--cotista .path__title { color: #fff; }
.step {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 18px;
  padding: 16px 0;
  border-top: 1px solid var(--border-1);
}
.path--cotista .step { border-top-color: rgba(255,255,255,0.08); }
.step:first-of-type { border-top: none; }
.step__num {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 14px;
  width: 32px; height: 32px;
  border-radius: 999px;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.

  // state is mirrored from the same localStorage key the deck reads so

    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),

  // mount before that element has upgraded. The initial read catches the

  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)

    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );

    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* global React, Icon */
// Shared primitives — eyebrow, sectionHeader, button, lockup, container.

const Container = ({ children, wide = false, className = '' }) =>
<div className={`container ${wide ? 'container--wide' : ''} ${className}`}>{children}</div>;


const Btn = ({ variant = 'primary', size = '', children, withArrow = true, ...rest }) =>
<button className={`btn btn--${variant} ${size ? 'btn--' + size : ''}`} {...rest}>
    {children}
    {withArrow &&

      </span>

const EmissionLockup = ({ children = 'EMISSÃO SNEL11' }) =>
<img
  src="LP_SNEL_5_Emissao/assets/snel11-campaign-horizontal.svg"
  alt={typeof children === 'string' ? children : '5ª Emissão SNEL11'}
  className="hero__lockup-img" style={{ height: "65px", width: "175px" }} />;



const SectionHeader = ({ eyebrow, title, lede, align = 'left', children }) =>
<header className={`section-header section-header--${align}`} style={{ marginBottom: 48, maxWidth: 880, textAlign: align }}>
    {eyebrow &&
  <div style={{ marginBottom: 18 }}>
        <span className="eyebrow-tag eyebrow-tag--accent">[ {eyebrow} ]</span>
      </div>
  }
    {title && <h2 className="h-section">{title}</h2>}
    {lede && <p className="lede" style={{ marginTop: 16, marginInline: align === 'center' ? 'auto' : 0 }}>{lede}</p>}
    {children}
  </header>;


// Use IntersectionObserver to fade-in elements
const FadeIn = ({ children, delay = 0, as = 'div', ...rest }) => {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          setTimeout(() => setVisible(true), delay);
          io.disconnect();
        }
      });
    }, { threshold: 0.12 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [delay]);
  const Tag = as;
  return (
    <Tag ref={ref} className={`fade-in ${visible ? 'visible' : ''} ${rest.className || ''}`} {...rest}>
      {children}
    </Tag>);

};

/* global React */
// SVG mini chart placeholders for result cards.

// Line area chart with subtle grid
const AreaChart = ({ data = [], width = 480, height = 180, color = '#609CFC', fill = 'rgba(96,156,252,0.15)', comparison = null, comparisonColor = '#A0ABB9' }) => {
  const max = Math.max(...data, ...(comparison || [])) * 1.08;
  const min = Math.min(...data, ...(comparison || [])) * 0.95;
  const w = width;
  const h = height;
  const padL = 28, padR = 12, padT = 14, padB = 22;
  const innerW = w - padL - padR;
  const innerH = h - padT - padB;
  const toPt = (arr) => arr.map((v, i) => {
    const x = padL + (i / (arr.length - 1)) * innerW;
    const y = padT + (1 - (v - min) / (max - min)) * innerH;
    return [x, y];
  });
  const pts = toPt(data);
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length - 1][0]},${padT + innerH} L${pts[0][0]},${padT + innerH} Z`;
  const cmpLine = comparison ? toPt(comparison).map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ') : null;

  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height="100%" preserveAspectRatio="none">
      {/* gridlines */}
      {[0.25, 0.5, 0.75].map((t, i) => (
        <line key={i} x1={padL} x2={w - padR} y1={padT + innerH * t} y2={padT + innerH * t} stroke="rgba(13,24,77,0.06)" strokeDasharray="2 4" />
      ))}
      {cmpLine && (

        const x = padL + i * bw + 1.5;
        const bh = (v / max) * innerH;
        const y = padT + innerH - bh;

// Stacked area / patrimony growth
const PatrimonyChart = ({ data = [], labels = [], width = 360, height = 180 }) => {

        const x = padL + i * bw + 4;

// Cotistas growth — line with markers
const CotistasChart = ({ data = [], labels = [], width = 360, height = 180 }) => {
  const max = Math.max(...data) * 1.12;
  const padL = 28, padR = 14, padT = 16, padB = 24;
  const innerW = width - padL - padR;
  const innerH = height - padT - padB;
  const pts = data.map((v, i) => {
    const x = padL + (i / (data.length - 1)) * innerW;
    const y = padT + (1 - v / max) * innerH;
    return [x, y, v];
  });
  const line = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const area = `${line} L${pts[pts.length - 1][0]},${padT + innerH} L${pts[0][0]},${padT + innerH} Z`;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="100%" preserveAspectRatio="none">

  );
};

// Tiny sparkline (for big number cards)
const Spark = ({ data = [3, 5, 4, 7, 6, 9, 8, 11], color = '#609CFC', width = 86, height = 28 }) => {
  const max = Math.max(...data), min = Math.min(...data);
  const pts = data.map((v, i) => {
    const x = (i / (data.length - 1)) * width;
    const y = height - 2 - ((v - min) / (max - min || 1)) * (height - 4);
    return `${x},${y.toFixed(1)}`;
  });
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
};

  "headlineAccent": "sun",
  "showAlertBar": true,
  "darkVideoCard": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks via CSS custom properties on the root.
  React.useEffect(() => {
    const root = document.documentElement;
    // Primary CTA accent color
    const ctaMap = {
      navy:   { bg: '#2ABD74', fg: '#fff' },
      blue:   { bg: '#2ABD74', fg: '#fff' },
      sun:    { bg: '#2ABD74', fg: '#fff' },
    };
    const cta = ctaMap[t.ctaStyle] || ctaMap.navy;
    document.querySelectorAll('.btn--primary').forEach(el => {
      el.style.background = cta.bg;
      el.style.color = cta.fg;
    });

    // Headline accent (the colored words in section headers)
    const accentMap = {
      sun: '#FABE1E',
      blue: '#609CFC',
      orange: '#FE8E23',
    };
    root.style.setProperty('--accent-headline', accentMap[t.headlineAccent] || accentMap.sun);
  }, [t]);

  return (
    <>
      {t.showAlertBar && <AlertBar />}
      <SiteHeader />
      <main>
        <Hero />
        <VideoHero />
        <Emotional />
        <BigNumbers />
        <ResultCards />
        <WhyNow />
        <BeforeAfter />
        <Cronograma />
        <Tutorial />
        <FinalCTA />
        <RiskFactors />
        <Disclaimer />

            { value: 'sun',  label: 'Sun' },

        <TweakRadio
          label="Cor de destaque"
          value={t.headlineAccent}
          options={[
            { value: 'sun', label: 'Amarelo' },
            { value: 'blue', label: 'Azul' },
            { value: 'orange', label: 'Laranja' },
          ]}
          onChange={(v) => setTweak('headlineAccent', v)}

        .final-cta h2 .sun {

      `}</style>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
